<div class="container my-4">
  <!-- En-tête avec logos -->
  <div class="d-flex justify-content-center align-items-center flex-wrap gap-4 mb-4">
    <img src="assets/logo_hackathon.jpg" alt="Mon logo" class="logo">
    <img src="assets/an_dour.png" alt="An dour" class="logo">
  </div>

  <h1>Carte interactive</h1>

  <div class="carte-container d-flex flex-column flex-lg-row gap-4">
    <!-- Carte -->
    <div id="map"></div>

    <!-- Contrôles -->
    <div class="layer-control card shadow-sm p-3">
      <h3 class="mb-3 text-primary fw-bold">Couches de données</h3>

      <div class="layer-item" *ngFor="let layer of layers">
        <label class="checkbox-label d-flex align-items-center mb-2">
          <input
            type="checkbox"
            [(ngModel)]="layer.visible"
            (change)="toggleLayer(layer)"
            class="form-check-input me-2"
          />
          <span class="layer-indicator me-2" [style.background-color]="layer.color"></span>
          <span class="layer-name">{{ layer.name }}</span>
        </label>
      </div>
    </div>
  </div>

  <p class="info">Sélectionnez les couches pour afficher les données sur la carte.</p>
</div>
